<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>abc-gui demo</title>
<link rel="stylesheet" href="../dist/abc-gui.css" />
<style>
  html, body { margin: 0; }
  body {
    font: 14px system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    max-width: 1100px;
    margin: 0 auto;
    padding: 12px;
    box-sizing: border-box;
    background: var(--demo-bg, #ffffff);
    color: var(--demo-fg, #222);
  }
  body.demo-dark {
    --demo-bg: #181a1d;
    --demo-fg: #e4e6ea;
  }
  h1 { font-size: 1.4em; margin: 0 0 6px; }
  h3 { font-size: 1em; margin: 12px 0 4px; }
  pre {
    background: #f4f4f4;
    padding: 8px;
    border-radius: 4px;
    min-height: 80px;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: auto;
  }
  body.demo-dark pre { background: #2c2f34; color: #e4e6ea; }
  .demo-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .demo-bar button {
    font: inherit;
    padding: 4px 10px;
    border: 1px solid #bbb;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
  }
  body.demo-dark .demo-bar button {
    background: #2c2f34;
    color: #e4e6ea;
    border-color: #4a4e54;
  }
  .demo-bar button.active {
    background: #d5e4ff;
    border-color: #6b8fd6;
  }
  body.demo-dark .demo-bar button.active {
    background: #2d4576;
    border-color: #5380d6;
  }
  /* Give the editor a fixed outer height so its internal scrollbars
     activate when the content is taller than the host. */
  #host {
    height: 560px;
    border-radius: 6px;
  }
  @media (max-width: 600px) {
    body { padding: 8px; font-size: 13px; }
    h1 { font-size: 1.2em; }
    #host { height: 80vh; }
  }
  /* Splash screen ---------------------------------------------- */
  .demo-splash {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .demo-splash[hidden] { display: none; }
  .demo-splash-card {
    background: var(--demo-bg, #fff);
    color: var(--demo-fg, #222);
    max-width: 560px;
    width: calc(100% - 32px);
    max-height: 80vh;
    overflow: auto;
    border-radius: 8px;
    padding: 16px 20px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
  }
  body.demo-dark .demo-splash-card {
    background: #23262b;
    color: #e4e6ea;
  }
  .demo-splash-card h2 { margin-top: 0; }
  .demo-splash-card kbd {
    background: #eee;
    border: 1px solid #bbb;
    border-radius: 3px;
    padding: 0 4px;
    font-family: inherit;
    font-size: 0.9em;
  }
  body.demo-dark .demo-splash-card kbd {
    background: #3a3d42;
    border-color: #555;
  }
  .demo-splash-actions {
    margin-top: 12px;
    text-align: right;
  }
</style>
</head>
<body>
<h1 id="demo-title">abc-gui WYSIWYG editor — demo</h1>
<p id="demo-intro">Click any element in the rendered score to edit its properties.</p>

<div class="demo-bar">
  <span id="label-language">Language:</span>
  <button id="lang-en" title="English">🇬🇧 English</button>
  <button id="lang-hu" title="Magyar">🇭🇺 Magyar</button>
  <span id="label-theme" style="margin-left:12px;">Theme:</span>
  <button id="theme-toggle" title="Toggle dark mode">🌙 Dark</button>
  <button id="help-btn" title="Show tutorial" style="margin-left:12px;">❓ Help</button>
</div>

<div id="host"></div>

<div id="splash" class="demo-splash" hidden>
  <div class="demo-splash-card" role="dialog" aria-modal="true" aria-labelledby="splash-title">
    <h2 id="splash-title">abc-gui — quick tutorial</h2>
    <p id="splash-intro">This is a WYSIWYG editor for <a href="https://abcnotation.com/wiki/abc:standard:v2.1" target="_blank" rel="noopener">ABC music notation</a>. Edit the score visually or via its raw text.</p>
    <div id="splash-content"></div>
    <div class="demo-splash-actions">
      <button id="splash-close">Got it</button>
    </div>
  </div>
</div>

<h3 id="log-title">onChange callback output</h3>
<pre id="log"></pre>

<script src="../dist/index.iife.js"></script>
<script>
  const initial = [
    "X:1",
    "T:Example",
    "C:Anonymous",
"M:4/4",
"L:1/8",
    "Q:1/4=120",
    "K:G",
    '"G"GABc d2ef|"D"g2fe d2cB|"Em"A2GF E2D2|"G"[GBd]4 z2 z2|'
  ].join("\n");

  const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;

  const editor = AbcGui.mount(document.getElementById("host"), {
    value: initial,
    locale: "en",
    theme: prefersDark ? "dark" : "light",
    hideRawView: true,
    onChange: (abc) => {
      document.getElementById("log").textContent = abc;
    },
    chordEditor: async (chord) => {
      // This is just a dummy implementation for demo purposes. A real chord editor
      // would show a UI for the user to edit the chord and return the updated
      // values.
      console.log("Edit chord:", chord);
      return {
        chordName: "Cm7",
        chordMidiValues: [60, 63, 67, 70], // C min 7
      };
    },
    chordVerifier: (chordName, germanAlphabet) => {
      // Demo strict verifier; host apps can replace this with richer logic.
      const normalized = germanAlphabet
        ? chordName.replace(/^H/, "B").replace(/^B(?!b)/, "Bb")
        : chordName;
      return /^\(?[A-G](?:#|b)?(?:m|maj|min|dim|aug|sus|add)?\d*(?:\/[A-G](?:#|b)?)?\)?$/i
        .test(normalized.trim());
    },
  });
  document.getElementById("log").textContent = editor.getValue();

  const DEMO_STRINGS = {
    en: {
      docLang: "en",
      pageTitle: "abc-gui demo",
      heading: "abc-gui WYSIWYG editor — demo",
      intro: "Click any element in the rendered score to edit its properties.",
      languageLabel: "Language:",
      themeLabel: "Theme:",
      englishTitle: "English",
      hungarianTitle: "Hungarian",
      themeToggleTitle: "Toggle dark mode",
      themeLight: "☀️ Light",
      themeDark: "🌙 Dark",
      helpTitle: "Show tutorial",
      helpButton: "❓ Help",
      splashTitle: "abc-gui — quick tutorial",
      splashIntroHtml: "This is a WYSIWYG editor for <a href=\"https://abcnotation.com/wiki/abc:standard:v2.1\" target=\"_blank\" rel=\"noopener\">ABC music notation</a>. Edit the score visually or via its raw text.",
      splashClose: "Got it",
      logTitle: "onChange callback output"
    },
    hu: {
      docLang: "hu",
      pageTitle: "abc-gui demo",
      heading: "abc-gui WYSIWYG szerkesztő — demo",
      intro: "Kattints bármelyik elemre a megjelenített kottában a tulajdonságok szerkesztéséhez.",
      languageLabel: "Nyelv:",
      themeLabel: "Téma:",
      englishTitle: "Angol",
      hungarianTitle: "Magyar",
      themeToggleTitle: "Sötét mód váltása",
      themeLight: "☀️ Világos",
      themeDark: "🌙 Sötét",
      helpTitle: "Útmutató megnyitása",
      helpButton: "❓ Súgó",
      splashTitle: "abc-gui — gyors útmutató",
      splashIntroHtml: "Ez egy WYSIWYG szerkesztő az <a href=\"https://abcnotation.com/wiki/abc:standard:v2.1\" target=\"_blank\" rel=\"noopener\">ABC kottaíráshoz</a>. A kottát vizuálisan vagy nyers szövegként is szerkesztheted.",
      splashClose: "Rendben",
      logTitle: "onChange callback kimenete"
    }
  };

  const demoTitle = document.getElementById("demo-title");
  const demoIntro = document.getElementById("demo-intro");
  const languageLabel = document.getElementById("label-language");
  const themeLabel = document.getElementById("label-theme");
  const logTitle = document.getElementById("log-title");

  // Language switcher -----------------------------------------------
  const enBtn = document.getElementById("lang-en");
  const huBtn = document.getElementById("lang-hu");
  const themeBtn = document.getElementById("theme-toggle");
  const splash = document.getElementById("splash");
  const splashContent = document.getElementById("splash-content");
  const splashTitle = document.getElementById("splash-title");
  const splashIntro = document.getElementById("splash-intro");
  const splashClose = document.getElementById("splash-close");
  const helpBtn = document.getElementById("help-btn");

  let dark = prefersDark;
  let currentLang = "en";

  function syncThemeButton() {
    const t = DEMO_STRINGS[currentLang] || DEMO_STRINGS.en;
    themeBtn.textContent = dark ? t.themeLight : t.themeDark;
    themeBtn.title = t.themeToggleTitle;
  }

  function applyDemoLang(id) {
    const t = DEMO_STRINGS[id] || DEMO_STRINGS.en;
    currentLang = id;
    document.documentElement.lang = t.docLang;
    document.title = t.pageTitle;
    demoTitle.textContent = t.heading;
    demoIntro.textContent = t.intro;
    languageLabel.textContent = t.languageLabel;
    themeLabel.textContent = t.themeLabel;
    enBtn.title = t.englishTitle;
    huBtn.title = t.hungarianTitle;
    helpBtn.title = t.helpTitle;
    helpBtn.textContent = t.helpButton;
    splashTitle.textContent = t.splashTitle;
    splashIntro.innerHTML = t.splashIntroHtml;
    splashClose.textContent = t.splashClose;
    logTitle.textContent = t.logTitle;
    syncThemeButton();
    if (!splash.hidden) {
      splashContent.innerHTML = editor.getTutorialHtml();
    }
  }

  function setLang(id) {
    editor.setLocale(id);
    editor.setAbcjsOptions({ germanAlphabet: id === "hu" });
    applyDemoLang(id);
    enBtn.classList.toggle("active", id === "en");
    huBtn.classList.toggle("active", id === "hu");
  }
  enBtn.addEventListener("click", () => setLang("en"));
  huBtn.addEventListener("click", () => setLang("hu"));

  // Theme toggle ----------------------------------------------------
  editor.setTheme(dark ? "dark" : "light");
  document.body.classList.toggle("demo-dark", dark);
  syncThemeButton();
  themeBtn.addEventListener("click", () => {
    dark = !dark;
    editor.setTheme(dark ? "dark" : "light");
    document.body.classList.toggle("demo-dark", dark);
    syncThemeButton();
  });

  // Splash screen / tutorial ---------------------------------------
  function showSplash() {
    splashContent.innerHTML = editor.getTutorialHtml();
    splash.hidden = false;
  }
  function hideSplash() { splash.hidden = true; }
  splashClose.addEventListener("click", hideSplash);
  splash.addEventListener("click", (e) => {
    if (e.target === splash) hideSplash();
  });
  helpBtn.addEventListener("click", showSplash);

  setLang("en");

  // Show the tutorial splash on first visit only.
  if (!localStorage.getItem("abc-gui-demo-splash-seen")) {
    showSplash();
    localStorage.setItem("abc-gui-demo-splash-seen", "1");
  }
</script>
</body>
</html>
